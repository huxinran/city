<div class="box" [class.focused]="isFocused" [attr.data-i]="tile.i" [attr.data-j]="tile.j" (click)="HandleClick()" [ngStyle]="GetTerrainStyle()">
    @if (isFeatureTree) {
        <span class="terrain-icon">🌳</span>
    } @else if (isFeatureRock) {
        <span class="terrain-icon">🪨</span>
    }
    @if (tile.building) {
        <div class="building" [class.cobble]="isRoad" [ngStyle]="GetBuildingStyle()"
             [attr.draggable]="isRoad ? null : 'true'"
             (dragstart)="onBuildingDragStart($event)"
             (dragend)="onBuildingDragEnd()">
            @if (isRoad) {
                <!-- cobblestone texture only, no content -->
            } @else if (isFarm) {
                <div class="farm-layout">
                    <div class="farm-house">
                        <span>🛖</span>
                    </div>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                    <app-icon class="farm-produce" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="13"></app-icon>
                </div>
            } @else if (isWorkshop) {
                <div class="workshop-layout">
                    <app-icon class="workshop-icon" [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="16"></app-icon>
                    <span class="workshop-product">{{GetProductIcon()}}</span>
                </div>
            } @else {
                <div class="icon-slot">
                    <app-icon [src]="buildingIconSrc" [fallback]="GetIcon()" [size]="size * 14 + 8"></app-icon>
                </div>
                @if (size > 1) {
                    <span class="name">{{GetType()}}</span>
                }
            }
        </div>
    }
</div>
