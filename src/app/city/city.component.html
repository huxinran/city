<div class="grid" [ngStyle]="getStyle()" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
    @for (tile of city.tiles; track $index) {
        <app-tile [tile]="tile"></app-tile>
    }
    @if (state.dragging && dropHi) {
        <div class="drop-highlight" [ngStyle]="dropHiStyle()"></div>
    }
    @if (isRoadArmed()) {
        <div class="road-start" [ngStyle]="roadStartStyle()"></div>
    }
    <app-cart-layer [city]="city"></app-cart-layer>
</div>
