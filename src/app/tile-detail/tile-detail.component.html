<div class="panel">
    <div class="panel-title">Selection</div>
    @if (tile) {
        <div class="panel-heading">{{tile.building ? tile.building.type : tile.terrain}}</div>
        @if (tile.building) {
            <hr class="divider">
            <app-building [tile]="tile"></app-building>
        }
    } @else {
        <div class="empty-hint">Click a tile to inspect it.</div>
    }
</div>
