<div class="container">
  <div class="top-menu">
    <app-status-summary></app-status-summary>
    <span class="top-spacer"></span>
    <app-menu class="sxs"></app-menu>
  </div>
  <div class="map-container"
       (pointerdown)="onMapPointerDown($event)"
       (pointermove)="onMapPointerMove($event)"
       (pointerup)="onMapPointerUp($event)"
       (pointercancel)="onMapPointerUp($event)">
    <app-city [city]="state.state.current_city!"></app-city>
  </div>
  @if (state.state.current_city!.focus_tile?.building) {
    <div class="info-backdrop" (click)="closeInfoPopup()"></div>
    <section class="info-popover" role="dialog" aria-modal="true" aria-label="Building details">
      <button class="info-close" type="button" aria-label="Close" title="Close" (click)="closeInfoPopup()">×</button>
      <app-tile-detail [tile]="state.state.current_city!.focus_tile"></app-tile-detail>
    </section>
  }
  <div class="bottom-menu">
    <app-palette></app-palette>
  </div>
</div>
