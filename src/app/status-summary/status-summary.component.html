<div class="statusbar">
    <span class="city">{{state.state.current_city!.name}}</span>
    @for (tier of state.state.current_city!.population.tiers; track $index) {
        <span class="stat" [title]="tier.tier">
            <img class="resident-icon" [src]="icon(tier.tier)" [alt]="tier.tier">
            <span class="v">{{tier.has}}<span class="mut">/{{tier.needed}}</span></span>
        </span>
    }
    <span class="stat">
        <span class="k">💰</span>
        <span class="v gold">{{state.state.gold | number: '1.0-0'}}</span>
    </span>
    <span class="stat">
        <span class="k">🏛️ {{state.state.tax_rate * 100 | number: '1.0-0'}}%</span>
        <span class="v gold">+{{state.TaxIncome(state.state.current_city!) | number: '1.0-2'}}</span>
    </span>
</div>
