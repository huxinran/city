<div class="panel">
    <div class="panel-heading">{{state.state.current_city!.name}}</div>
    <hr class="divider">
    @for (tier of state.state.current_city!.population.tiers; track $index) {
        <div class="row">
            <span class="key">{{tier.tier}}</span>
            <span class="val">{{tier.has}} <span style="color:var(--text-mut)">/ {{tier.needed}}</span></span>
        </div>
    }
    <hr class="divider">
    <div class="row">
        <span class="key">💰 Gold</span>
        <span class="val val-gold">{{state.state.gold | number: '1.0-0'}}</span>
    </div>
</div>
