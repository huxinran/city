<div class="statusbar">
    <span class="city-wrap">
        <button class="city" (click)="toggleCities()">{{state.state.current_city!.name}} ▾</button>
        @if (citiesOpen()) {
            <div class="city-backdrop" (click)="closeCities()"></div>
            <div class="city-menu">
                @for (c of state.state.cities; track c.name) {
                    <button class="city-item" [class.active]="c === state.state.current_city" (click)="selectCity(c.name)">{{c.name}}</button>
                }
            </div>
        }
    </span>
    @for (tier of state.state.current_city!.population.tiers; track $index) {
        <span class="stat" [title]="tier.tier">
            <img class="resident-icon" [src]="icon(tier.tier)" [alt]="tier.tier">
            <span class="v">{{tier.has}}<span class="mut">/{{tier.needed}}</span></span>
        </span>
    }
    <span class="stat" [title]="goldType">
        <app-icon class="material-icon" [src]="resSrc(goldType)" [fallback]="'💰'" [alt]="goldType" [size]="60"></app-icon>
        <span class="v gold">{{state.state.gold | number: '1.0-0'}}</span>
    </span>
    @for (m of materials; track m) {
        <span class="stat" [title]="m">
            <app-icon class="material-icon" [src]="resSrc(m)" [fallback]="resEmoji(m)" [alt]="m" [size]="60"></app-icon>
            <span class="v">{{count(m) | number: '1.0-0'}}</span>
        </span>
    }
</div>
